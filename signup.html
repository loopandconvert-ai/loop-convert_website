<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account — Loop &amp; Convert</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/png" href="images/logo.png" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .auth-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      background: var(--black);
    }
    .auth-card {
      width: 100%;
      max-width: 420px;
      background: #111;
      border: 1px solid var(--grey-100);
      border-radius: var(--radius-xl);
      padding: 2.5rem 2rem;
    }
    .auth-logo {
      font-size: 1.2rem;
      font-weight: 800;
      color: var(--white);
      text-decoration: none;
      display: block;
      margin-bottom: 2rem;
    }
    .auth-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--white);
      margin-bottom: .35rem;
    }
    .auth-sub {
      color: var(--grey-400);
      font-size: .9rem;
      margin-bottom: 2rem;
    }
    .auth-field {
      margin-bottom: 1rem;
    }
    .auth-field label {
      display: block;
      font-size: .82rem;
      font-weight: 500;
      color: var(--grey-200);
      margin-bottom: .4rem;
    }
    .auth-field input {
      width: 100%;
      background: #191919;
      border: 1px solid var(--grey-100);
      border-radius: var(--radius-md);
      padding: .7rem 1rem;
      color: var(--white);
      font-size: .95rem;
      font-family: inherit;
      outline: none;
      transition: border-color .2s;
      box-sizing: border-box;
    }
    .auth-field input:focus {
      border-color: var(--blue);
    }
    .auth-error {
      color: #f87171;
      font-size: .85rem;
      margin-bottom: 1rem;
      display: none;
    }
    .auth-success {
      color: #4ade80;
      font-size: .9rem;
      background: rgba(74,222,128,.08);
      border: 1px solid rgba(74,222,128,.2);
      border-radius: var(--radius-md);
      padding: .75rem 1rem;
      margin-bottom: 1rem;
      display: none;
    }
    .auth-btn {
      width: 100%;
      text-align: center;
      margin-top: .5rem;
      padding: .75rem 1rem;
      font-size: .95rem;
    }
    .auth-footer {
      text-align: center;
      margin-top: 1.5rem;
      color: var(--grey-400);
      font-size: .875rem;
    }
    .auth-footer a {
      color: var(--white);
      text-decoration: underline;
    }
    .auth-hint {
      font-size: .78rem;
      color: var(--grey-500);
      margin-top: .3rem;
    }
  </style>
</head>
<body data-page="auth-page">

  <div class="auth-wrap">
    <div class="auth-card">

      <a href="index.html" class="auth-logo">Loop <span class="accent">&amp;</span> Convert</a>

      <h1 class="auth-title">Create your account</h1>
      <p class="auth-sub">Start analyzing contracts for free — no credit card needed.</p>

      <div class="auth-error"   id="signup-error"></div>
      <div class="auth-success" id="signup-success">
        Account created! Check your email to confirm your address, then log in.
      </div>

      <form id="signup-form" novalidate>
        <div class="auth-field">
          <label for="name">Full name</label>
          <input type="text" id="name" placeholder="Jane Smith" autocomplete="name" required />
        </div>
        <div class="auth-field">
          <label for="firm">Law firm name</label>
          <input type="text" id="firm" placeholder="Smith &amp; Partners LLP" autocomplete="organization" />
        </div>
        <div class="auth-field">
          <label for="email">Email address</label>
          <input type="email" id="email" placeholder="you@lawfirm.com" autocomplete="email" required />
        </div>
        <div class="auth-field">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Min. 8 characters" autocomplete="new-password" required />
          <p class="auth-hint">At least 8 characters.</p>
        </div>
        <button type="submit" class="btn btn-primary auth-btn" id="signup-btn">Create Account</button>
      </form>

      <p class="auth-footer" style="margin-top:1.5rem;">
        Already have an account? <a href="login.html">Log in</a>
      </p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script>
  (function () {
    var form       = document.getElementById('signup-form');
    var errBox     = document.getElementById('signup-error');
    var successBox = document.getElementById('signup-success');
    var btn        = document.getElementById('signup-btn');

    function showErr(msg) {
      errBox.textContent   = msg;
      errBox.style.display = 'block';
      successBox.style.display = 'none';
    }

    form.addEventListener('submit', function (e) {
      e.preventDefault();
      errBox.style.display = 'none';
      successBox.style.display = 'none';

      var name     = document.getElementById('name').value.trim();
      var firm     = document.getElementById('firm').value.trim();
      var email    = document.getElementById('email').value.trim();
      var password = document.getElementById('password').value;

      if (!name || !email || !password) { showErr('Please fill in all required fields.'); return; }
      if (password.length < 8)           { showErr('Password must be at least 8 characters.'); return; }

      if (!window.LC_AUTH) {
        showErr('Auth not configured — check js/config.js.');
        return;
      }

      btn.textContent = 'Creating account…';
      btn.disabled    = true;

      // Store firm name in user metadata
      window.LC_SUPABASE.auth.signUp({
        email: email,
        password: password,
        options: { data: { full_name: name, firm_name: firm } }
      }).then(function (res) {
        if (res.error) {
          showErr(res.error.message || 'Sign up failed. Please try again.');
          btn.textContent = 'Create Account';
          btn.disabled    = false;
        } else {
          // If a firm name was entered, create a workspace for this user
          if (firm && res.data && res.data.user && window.LC_AUTH) {
            window.LC_AUTH.createWorkspace(firm).catch(function () {});
          }
          form.style.display       = 'none';
          successBox.style.display = 'block';
        }
      });
    });
  })();
  </script>
</body>
</html>
