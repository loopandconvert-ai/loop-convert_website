<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log In — Loop &amp; Convert</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/png" href="images/logo.png" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .auth-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      background: var(--black);
    }
    .auth-card {
      width: 100%;
      max-width: 420px;
      background: #111;
      border: 1px solid var(--grey-100);
      border-radius: var(--radius-xl);
      padding: 2.5rem 2rem;
    }
    .auth-logo {
      font-size: 1.2rem;
      font-weight: 800;
      color: var(--white);
      text-decoration: none;
      display: block;
      margin-bottom: 2rem;
    }
    .auth-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--white);
      margin-bottom: .35rem;
    }
    .auth-sub {
      color: var(--grey-400);
      font-size: .9rem;
      margin-bottom: 2rem;
    }
    .auth-field {
      margin-bottom: 1rem;
    }
    .auth-field label {
      display: block;
      font-size: .82rem;
      font-weight: 500;
      color: var(--grey-200);
      margin-bottom: .4rem;
    }
    .auth-field input {
      width: 100%;
      background: #191919;
      border: 1px solid var(--grey-100);
      border-radius: var(--radius-md);
      padding: .7rem 1rem;
      color: var(--white);
      font-size: .95rem;
      font-family: inherit;
      outline: none;
      transition: border-color .2s;
      box-sizing: border-box;
    }
    .auth-field input:focus {
      border-color: var(--blue);
    }
    .auth-error {
      color: #f87171;
      font-size: .85rem;
      margin-bottom: 1rem;
      display: none;
    }
    .auth-btn {
      width: 100%;
      text-align: center;
      margin-top: .5rem;
      padding: .75rem 1rem;
      font-size: .95rem;
    }
    .auth-footer {
      text-align: center;
      margin-top: 1.5rem;
      color: var(--grey-400);
      font-size: .875rem;
    }
    .auth-footer a {
      color: var(--white);
      text-decoration: underline;
    }
    .auth-divider {
      display: flex;
      align-items: center;
      gap: .75rem;
      margin: 1.5rem 0;
      color: var(--grey-500);
      font-size: .8rem;
    }
    .auth-divider::before,
    .auth-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--grey-100);
    }
  </style>
</head>
<body data-page="auth-page">

  <div class="auth-wrap">
    <div class="auth-card">

      <a href="index.html" class="auth-logo">Loop <span class="accent">&amp;</span> Convert</a>

      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-sub">Log in to your account to view your contracts.</p>

      <div class="auth-error" id="login-error"></div>

      <form id="login-form" novalidate>
        <div class="auth-field">
          <label for="email">Email address</label>
          <input type="email" id="email" placeholder="you@lawfirm.com" autocomplete="email" required />
        </div>
        <div class="auth-field">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required />
        </div>
        <button type="submit" class="btn btn-primary auth-btn" id="login-btn">Log In</button>
      </form>

      <div class="auth-divider">or</div>

      <p class="auth-footer">
        Don't have an account yet?<br />
        <a href="book.html">Book a call to get access →</a>
      </p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script>
  (function () {
    var form   = document.getElementById('login-form');
    var errBox = document.getElementById('login-error');
    var btn    = document.getElementById('login-btn');

    function showErr(msg) {
      errBox.textContent = msg;
      errBox.style.display = 'block';
    }

    // Redirect after login if ?next= param present
    function getNext() {
      var params = new URLSearchParams(window.location.search);
      return params.get('next') || 'dashboard.html';
    }

    form.addEventListener('submit', function (e) {
      e.preventDefault();
      errBox.style.display = 'none';

      var email    = document.getElementById('email').value.trim();
      var password = document.getElementById('password').value;

      if (!email || !password) { showErr('Please fill in all fields.'); return; }

      if (!window.LC_AUTH) {
        showErr('Auth not configured — check js/config.js.');
        return;
      }

      btn.textContent = 'Logging in…';
      btn.disabled = true;

      window.LC_AUTH.signIn(email, password).then(function (res) {
        if (res.error) {
          showErr(res.error.message || 'Login failed. Check your email and password.');
          btn.textContent = 'Log In';
          btn.disabled = false;
        } else {
          window.location.href = getNext();
        }
      });
    });
  })();
  </script>
</body>
</html>
